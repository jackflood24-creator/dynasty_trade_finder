name: Update Dynasty Predictions

on:
  schedule:
    # Runs every day at 8am UTC (3am EST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests nfl_data_py xgboost scikit-learn

      - name: Run prediction pipeline
        run: python scripts/generate_predictions.py

      - name: Commit predictions
        run: |
          git config user.name "Dynasty Bot"
          git config user.email "bot@dynasty-trade-finder.com"
          git add data/predictions.json data/career_stats.json
          git diff --staged --quiet || git commit -m "🤖 Update predictions $(date +'%Y-%m-%d')"
          git push
